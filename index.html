<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>habit.track — dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--bg2:#f5f5f3;--bg3:#ebebea;--txt:#0a0a0a;--txt2:#6b6b6b;--txt3:#aaaaaa;--bdr:#e0e0de;--green:#22c55e;--red:#ef4444}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}
body.dark{--bg:#0c0c0c;--bg2:#161616;--bg3:#222222;--txt:#f0f0f0;--txt2:#888888;--txt3:#555555;--bdr:#2a2a2a}
.wrap{max-width:1140px;margin:0 auto;padding:32px 24px}
header{display:flex;align-items:center;justify-content:space-between;padding-bottom:24px;border-bottom:1px solid var(--bdr);margin-bottom:28px;flex-wrap:wrap;gap:16px}
.logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-1px;color:var(--txt)}
.logo span{opacity:.3}
.header-right{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.update-info{font-size:11px;color:var(--txt3);letter-spacing:.04em}
.update-info b{color:var(--txt2)}
.refresh-btn{font-family:'DM Mono',monospace;font-size:11px;color:var(--txt3);background:none;border:1px solid var(--bdr);border-radius:6px;padding:5px 12px;cursor:pointer;transition:color .15s,border-color .15s;letter-spacing:.04em}
.refresh-btn:hover{color:var(--txt);border-color:var(--txt3)}
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.toggle-label{font-size:10px;color:var(--txt3);letter-spacing:.1em}
.toggle-track{width:38px;height:20px;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;position:relative;transition:background .2s}
.toggle-thumb{width:14px;height:14px;background:var(--txt);border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s}
body.dark .toggle-thumb{transform:translateX(18px)}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:28px;height:28px;border:2px solid var(--bdr);border-top-color:var(--txt);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--txt3);letter-spacing:.04em}
#dashboard{display:none}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--bg2);border-radius:10px;padding:20px}
.kpi-l{font-size:10px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.kpi-v{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;letter-spacing:-1.5px;line-height:1;color:var(--txt)}
.kpi-s{font-size:11px;color:var(--txt3);margin-top:8px}
.kpi-s.up{color:var(--green)}
.kpi-s.down{color:var(--red)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:700px){.g2,.g3{grid-template-columns:1fr}}
.card{background:var(--bg2);border-radius:10px;padding:20px}
.card-h{font-size:10px;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;padding-bottom:12px;border-bottom:1px solid var(--bdr);margin-bottom:16px}
.h-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.h-row:last-child{margin-bottom:0}
.h-name{font-size:12px;color:var(--txt2);width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.h-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.h-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.h-pct{font-size:11px;color:var(--txt3);width:32px;text-align:right;flex-shrink:0}
.t-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bdr);font-size:12px}
.t-item:last-child{border:none;padding-bottom:0}
.t-left{display:flex;align-items:center;gap:8px}
.t-dot{width:6px;height:6px;border-radius:50%;background:var(--bg3)}
.t-dot.ok{background:var(--green)}
.t-dot.no{background:var(--red)}
.t-status{font-size:11px;color:var(--txt3)}
.t-status.ok{color:var(--green)}
.t-status.no{color:var(--red)}
.c-row{margin-bottom:14px}
.c-row:last-child{margin-bottom:0}
.c-name{font-size:11px;color:var(--txt2);margin-bottom:5px}
.c-line{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.c-lbl{font-size:10px;color:var(--txt3);width:32px;flex-shrink:0}
.c-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.c-fill{height:100%;border-radius:2px}
.c-fill.this{background:var(--txt)}
.c-fill.last{background:var(--txt3)}
.c-pct{font-size:10px;color:var(--txt3);width:28px;text-align:right}
.c-trend{font-size:10px;margin-top:3px}
.c-trend.up{color:var(--green)}
.c-trend.dn{color:var(--red)}
.c-trend.eq{color:var(--txt3)}
.hm-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px}
.hm-lbl{font-size:9px;color:var(--txt3);text-align:center;letter-spacing:.05em;text-transform:uppercase}
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.hm-cell{aspect-ratio:1;border-radius:3px;background:var(--bg3)}
.hm-cell.g1{background:var(--txt);opacity:.15}
.hm-cell.g2{background:var(--txt);opacity:.35}
.hm-cell.g3{background:var(--txt);opacity:.65}
.hm-cell.g4{background:var(--txt);opacity:.9}
.hm-cell.lo{background:var(--red);opacity:.35}
.hm-legend{display:flex;gap:16px;margin-top:10px;font-size:10px;color:var(--txt3)}
.hm-legend span{display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:2px;display:inline-block}
canvas{max-height:200px}
.wd-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wd-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.wd-bar-wrap{height:100px;display:flex;align-items:flex-end;width:100%}
.wd-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.wd-day{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em}
.wd-pct{font-size:10px;color:var(--txt2)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo">habit<span>.</span>track</div>
  <div class="header-right">
    <div class="update-info">обновлено: <b id="upd-time">—</b></div>
    <button class="refresh-btn" onclick="loadData()">обновить</button>
    <div class="toggle-wrap" onclick="toggleTheme()">
      <span class="toggle-label" id="tlbl">LIGHT</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
  </div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">загружаем данные...</div>
</div>

<div id="dashboard">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-l">Сегодня</div><div class="kpi-v" id="k-today">—</div><div class="kpi-s" id="k-today-s">привычек</div></div>
    <div class="kpi"><div class="kpi-l">За 7 дней</div><div class="kpi-v" id="k-week">—</div><div class="kpi-s" id="k-week-s">выполнение</div></div>
    <div class="kpi"><div class="kpi-l">Серия</div><div class="kpi-v" id="k-streak">—</div><div class="kpi-s" id="k-streak-s">дней подряд</div></div>
    <div class="kpi"><div class="kpi-l">Всего</div><div class="kpi-v" id="k-total">—</div><div class="kpi-s">за всё время</div></div>
  </div>

  <div class="g3">
    <div class="card"><div class="card-h">Активность — 30 дней</div><canvas id="chart-line"></canvas></div>
    <div class="card"><div class="card-h">Сегодня</div><div id="today-list"></div></div>
  </div>

  <div class="g2">
    <div class="card"><div class="card-h">Прогресс за 7 дней</div><div id="habit-bars"></div></div>
    <div class="card"><div class="card-h">Эта неделя vs прошлая</div><div id="compare"></div></div>
  </div>

  <div class="g2">
    <div class="card">
      <div class="card-h">По дням недели</div>
      <div class="wd-grid" id="weekday-chart"></div>
    </div>
    <div class="card">
      <div class="card-h">Тепловая карта — 4 недели</div>
      <div class="hm-labels">
        <div class="hm-lbl">Пн</div><div class="hm-lbl">Вт</div><div class="hm-lbl">Ср</div>
        <div class="hm-lbl">Чт</div><div class="hm-lbl">Пт</div><div class="hm-lbl">Сб</div><div class="hm-lbl">Вс</div>
      </div>
      <div class="hm" id="heatmap"></div>
      <div class="hm-legend">
        <span><i class="dot" style="background:#0a0a0a;opacity:.9"></i>все</span>
        <span><i class="dot" style="background:#0a0a0a;opacity:.4"></i>частично</span>
        <span><i class="dot" style="background:#ef4444;opacity:.4"></i>пропуск</span>
        <span><i class="dot" style="background:#ebebea"></i>нет данных</span>
      </div>
    </div>
  </div>
</div>
</div>

<script>
const SPREADSHEET_ID='1_IDzcCd3P87oAzQopBCOXM3fOcyHnv2dxaDu_u3vjO0';

function toggleTheme(){
  document.body.classList.toggle('dark');
  document.getElementById('tlbl').textContent=document.body.classList.contains('dark')?'DARK':'LIGHT';
  if(window._lc) buildLineChart(window._lcd);
}

function today(){return new Date().toISOString().slice(0,10)}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)}

function barColor(pct){
  const s=getComputedStyle(document.body);
  if(pct>=70) return s.getPropertyValue('--txt').trim();
  if(pct>=40) return s.getPropertyValue('--txt2').trim();
  return s.getPropertyValue('--red').trim();
}

function parseCell(cell){
  if(!cell||cell.v===null||cell.v===undefined) return "";
  const v=cell.v;
  if(typeof v==="string"&&v.startsWith("Date(")){
    const parts=v.slice(5,-1).split(",").map(Number);
    const d=new Date(parts[0],parts[1],parts[2]);
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  return String(v);
}

async function fetchSheet(name){
  const url='https://docs.google.com/spreadsheets/d/'+SPREADSHEET_ID+'/gviz/tq?tqx=out:json&sheet='+encodeURIComponent(name);
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols=json.table.cols.map(c=>c.label);
  return json.table.rows.map(row=>{const obj={};row.c.forEach((cell,i)=>{obj[cols[i]]=parseCell(cell)});return obj});
}

function buildLineChart(data){
  const dk=document.body.classList.contains('dark');
  const tc=dk?'#555':'#aaa';
  const gc=dk?'#222':'#ebebea';
  const lc=dk?'#f0f0f0':'#0a0a0a';
  if(window._lc) window._lc.destroy();
  window._lcd=data;
  window._lc=new Chart(document.getElementById('chart-line'),{
    type:'bar',
    data:{labels:data.labels,datasets:[{data:data.values,backgroundColor:data.values.map(v=>v===null?'transparent':lc+'22'),borderColor:data.values.map(v=>v===null?'transparent':lc),borderWidth:1,borderRadius:3}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{
      y:{min:0,max:100,ticks:{color:tc,font:{family:'DM Mono',size:10},callback:v=>v+'%'},grid:{color:gc}},
      x:{ticks:{color:tc,font:{family:'DM Mono',size:10},maxTicksLimit:10},grid:{display:false}}
    }}
  });
}

async function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  try{
    const [checkins,habitsRaw]=await Promise.all([fetchSheet('Checkins'),fetchSheet('Habits')]);
    const habits=habitsRaw.filter(r=>String(r.active)==='1').map(r=>r.habit_name);
    const todayStr=today();
    const dates30=Array.from({length:30},(_,i)=>daysAgo(i)).reverse();
    const dates7=Array.from({length:7},(_,i)=>daysAgo(i)).reverse();
    const prevDates=Array.from({length:7},(_,i)=>daysAgo(i+7)).reverse();
    const cm={};
    checkins.forEach(r=>{if(r.date&&r.habit_name) cm[r.date+'||'+r.habit_name]=r.status});

    const doneToday=habits.filter(h=>cm[todayStr+'||'+h]==='done').length;
    document.getElementById('k-today').textContent=doneToday+'/'+habits.length;
    document.getElementById('k-today-s').textContent=doneToday===habits.length?'все выполнено':'выполнено сегодня';

    let wd=0,wt=0;
    dates7.forEach(d=>{if(d<=todayStr){habits.forEach(h=>{wt++;if(cm[d+'||'+h]==='done') wd++})}});
    const wp=wt?Math.round(wd/wt*100):0;
    let pd=0,pt=0;
    prevDates.forEach(d=>{habits.forEach(h=>{pt++;if(cm[d+'||'+h]==='done') pd++})});
    const pp=pt?Math.round(pd/pt*100):0;
    const diff=wp-pp;
    document.getElementById('k-week').textContent=wp+'%';
    const ws=document.getElementById('k-week-s');
    ws.textContent=(diff>0?'+':'')+diff+'% к прошлой';
    ws.className='kpi-s '+(diff>0?'up':diff<0?'down':'');

    document.getElementById('k-total').textContent=checkins.filter(r=>r.status==='done').length;

    let bs=0,bh='';
    habits.forEach(h=>{let s=0,mx=0;[...dates30].reverse().forEach(d=>{if(cm[d+'||'+h]==='done'){s++;mx=Math.max(mx,s)}else s=0});if(mx>bs){bs=mx;bh=h}});
    document.getElementById('k-streak').textContent=bs;
    document.getElementById('k-streak-s').textContent=bh||'дней подряд';

    document.getElementById('today-list').innerHTML=habits.map(h=>{
      const st=cm[todayStr+'||'+h]||'pending';
      const lbl=st==='done'?'выполнено':st==='skip'?'пропуск':'ожидает';
      const cls=st==='done'?'ok':st==='skip'?'no':'';
      return '<div class="t-item"><div class="t-left"><div class="t-dot '+cls+'"></div><span>'+h+'</span></div><span class="t-status '+cls+'">'+lbl+'</span></div>';
    }).join('');

    document.getElementById('habit-bars').innerHTML=habits.map(h=>{
      let done=0,total=0;
      dates7.forEach(d=>{if(d<=todayStr){total++;if(cm[d+'||'+h]==='done') done++}});
      const pct=total?Math.round(done/total*100):0;
      return '<div class="h-row"><span class="h-name">'+h+'</span><div class="h-track"><div class="h-fill" style="width:'+pct+'%;background:'+barColor(pct)+'"></div></div><span class="h-pct">'+pct+'%</span></div>';
    }).join('');

    document.getElementById('compare').innerHTML=habits.map(h=>{
      let td=0,tt=0,ld=0,lt=0;
      dates7.forEach(d=>{if(d<=todayStr){tt++;if(cm[d+'||'+h]==='done') td++}});
      prevDates.forEach(d=>{lt++;if(cm[d+'||'+h]==='done') ld++});
      const tp=tt?Math.round(td/tt*100):0,lp=lt?Math.round(ld/lt*100):0,df=tp-lp;
      const tc2=df>0?'up':df<0?'dn':'eq';
      const tt2=df>0?'+ лучше на '+df+'%':df<0?'- хуже на '+Math.abs(df)+'%':'без изменений';
      return '<div class="c-row"><div class="c-name">'+h+'</div><div class="c-line"><span class="c-lbl">Эта</span><div class="c-track"><div class="c-fill this" style="width:'+tp+'%"></div></div><span class="c-pct">'+tp+'%</span></div><div class="c-line"><span class="c-lbl">Прош.</span><div class="c-track"><div class="c-fill last" style="width:'+lp+'%"></div></div><span class="c-pct">'+lp+'%</span></div><div class="c-trend '+tc2+'">'+tt2+'</div></div>';
    }).join('');

    const ll=dates30.map(d=>{const dt=new Date(d);return dt.getDate()+'.'+(dt.getMonth()+1).toString().padStart(2,'0')});
    const lv=dates30.map(d=>{if(d>todayStr) return null;let done=0,total=0;habits.forEach(h=>{total++;if(cm[d+'||'+h]==='done') done++});return total?Math.round(done/total*100):0});
    buildLineChart({labels:ll,values:lv});

    const dd2=[0,0,0,0,0,0,0],dt2=[0,0,0,0,0,0,0];
    dates30.forEach(d=>{if(d>todayStr) return;const dow=(new Date(d).getDay()+6)%7;habits.forEach(h=>{dt2[dow]++;if(cm[d+'||'+h]==='done') dd2[dow]++})});
    const wdp=dd2.map((v,i)=>dt2[i]?Math.round(v/dt2[i]*100):0);
    const dayN=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
    document.getElementById('weekday-chart').innerHTML=dayN.map((n,i)=>'<div class="wd-col"><div class="wd-bar-wrap"><div class="wd-bar" style="height:'+wdp[i]+'%;background:'+barColor(wdp[i])+'"></div></div><div class="wd-day">'+n+'</div><div class="wd-pct">'+wdp[i]+'%</div></div>').join('');

    const hmEl=document.getElementById('heatmap');
    hmEl.innerHTML='';
    const start=new Date(daysAgo(27));
    start.setDate(start.getDate()-((start.getDay()+6)%7));
    for(let i=0;i<28;i++){
      const d=new Date(start);d.setDate(d.getDate()+i);
      const ds=d.toISOString().slice(0,10);
      let done=0,has=false;
      habits.forEach(h=>{if(cm[ds+'||'+h]){has=true;if(cm[ds+'||'+h]==='done') done++}});
      const tot=habits.length;
      let cls='';
      if(ds<=todayStr){
        if(!has||done===0) cls='lo';
        else if(done===tot) cls='g4';
        else if(done/tot>.6) cls='g3';
        else if(done/tot>.3) cls='g2';
        else cls='g1';
      }
      hmEl.innerHTML+='<div class="hm-cell '+cls+'" title="'+ds+': '+done+'/'+tot+'"></div>';
    }

    document.getElementById('upd-time').textContent=new Date().toLocaleTimeString('ru');
    document.getElementById('loading').style.display='none';
    document.getElementById('dashboard').style.display='block';
  }catch(e){
    document.getElementById('loading').innerHTML='<div style="font-size:13px;color:var(--red);text-align:center">ошибка загрузки<br><span style="font-size:11px;color:var(--txt3)">'+e.message+'</span><br><br><button class="refresh-btn" onclick="loadData()">попробовать снова</button></div>';
  }
}

loadData();
setInterval(loadData,5*60*1000);
</script>
</body>
</html>
